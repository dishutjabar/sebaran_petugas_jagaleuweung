<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sebaran Petugas Jaga Leuweung Tahun 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel-filter{
position:absolute;
top:10px;
left:10px;
background:white;
padding:15px;
border-radius:12px;
width:260px;
z-index:1000;
}

select,input,button{
width:100%;
margin-top:5px;
padding:6px;
}

.legend{
position:absolute;
top:10px;
right:10px;
background:white;
padding:10px;
z-index:1000;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel-filter">
<b>Filter Data</b>

<select id="filterKab"><option value="all">Semua Kabupaten</option></select>
<select id="filterKec"><option value="all">Semua Kecamatan</option></select>
<select id="filterDesa"><option value="all">Semua Desa</option></select>

<input type="text" id="searchNama" placeholder="Cari...">

<button onclick="applyFilter()">Cari</button>
<button onclick="resetFilter()">Reset</button>
</div>

<div class="legend" id="legend"></div>

<script>

// ================= MAP =================
var map = L.map('map').setView([-6.9,107.6],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= GLOBAL =================
let allData;
let markersLayer = L.layerGroup().addTo(map);

let activeCDK = ["CDK I","CDK II","CDK III","CDK IV","CDK V","CDK VI","CDK VII","CDK VIII","CDK IX"];

let selectedKab=null, selectedKec=null, selectedDesa=null, keyword="";

// ================= HELPER =================
function fix(v){ return parseFloat(String(v||"").replace(",",".")); }

function norm(t){
return (t||"").toLowerCase().replace(/kabupaten|kota/g,"").trim();
}

function isi(v){ return v||"-"; }

// ================= LOAD =================
fetch("Jaga.geojson")
.then(r=>r.json())
.then(d=>{
allData = d.features;
initFilter();
updateMap();
});

// ================= FILTER INIT =================
function initFilter(){

let kab=new Set(),kec=new Set(),desa=new Set();

allData.forEach(f=>{
let p=f.properties;
kab.add(p.Kabupaten);
kec.add(p.Kecamatan);
desa.add(p.Desa);
});

isiSelect("filterKab",kab);
isiSelect("filterKec",kec);
isiSelect("filterDesa",desa);
}

function isiSelect(id,set){
let el=document.getElementById(id);
set.forEach(v=>{
let o=document.createElement("option");
o.value=v;
o.innerHTML=v;
el.appendChild(o);
});
}

// ================= APPLY FILTER =================
function applyFilter(){
selectedKab = filterKab.value;
selectedKec = filterKec.value;
selectedDesa = filterDesa.value;
keyword = searchNama.value.toLowerCase();
updateMap();
}

function resetFilter(){
selectedKab=selectedKec=selectedDesa=null;
keyword="";
document.querySelectorAll("select").forEach(s=>s.value="all");
searchNama.value="";
updateMap();
}

// ================= UPDATE =================
function updateMap(){

markersLayer.clearLayers();

let grouped = {};

// LOOP DATA
allData.forEach(f=>{

let p=f.properties;

let lat=fix(p["Koordinat Desa (Latitude)"]);
let lon=fix(p["Koordinat Desa (Longitude)"]);
if(!lat||!lon) return;

// FILTER
if(selectedKab && selectedKab!="all" && p.Kabupaten!==selectedKab) return;
if(selectedKec && selectedKec!="all" && p.Kecamatan!==selectedKec) return;
if(selectedDesa && selectedDesa!="all" && p.Desa!==selectedDesa) return;
if(!activeCDK.includes(p.CDK)) return;

let text = JSON.stringify(p).toLowerCase();
if(keyword && !text.includes(keyword)) return;

// ================= GROUP RULE =================
let penyuluh = p["Penyuluh Kehutanan Pendamping"];

// kalau tidak ada penyuluh → unik
let key;

if(!penyuluh){
key = Math.random(); // tampil sendiri
}else{
key = penyuluh + "_" + p.CDK; // pisah kalau CDK beda
}

if(!grouped[key]) grouped[key]=[];

grouped[key].push({...p,lat,lon});
});

// ================= DRAW =================
Object.values(grouped).forEach(group=>{

let lat=group[0].lat;
let lon=group[0].lon;

let html="<div style='max-height:250px;overflow:auto'>";

group.forEach(p=>{
html+=`
<hr>
<b>Nama:</b> ${isi(p.Nama)}<br>
<b>NIK:</b> ${isi(p.NIK)}<br>
<b>Usia:</b> ${isi(p["Usia (Tahun)"])}<br>
<b>Kabupaten:</b> ${isi(p.Kabupaten)}<br>
<b>CDK:</b> ${isi(p.CDK)}
`;
});

html+="</div>";

L.circleMarker([lat,lon],{
radius:3,
color:getColor(group[0].CDK),
fillColor:getColor(group[0].CDK),
fillOpacity:1
})
.bindPopup(html)
.addTo(markersLayer);

});

updateLegend();
}

// ================= COLOR =================
function getColor(c){
return {
"CDK I":"red","CDK II":"blue","CDK III":"green",
"CDK IV":"orange","CDK V":"purple","CDK VI":"brown",
"CDK VII":"pink","CDK VIII":"gray","CDK IX":"black"
}[c]||"black";
}

// ================= LEGEND =================
function updateLegend(){

let div=document.getElementById("legend");
div.innerHTML="<b>CDK</b><br>";

["CDK I","CDK II","CDK III","CDK IV","CDK V","CDK VI","CDK VII","CDK VIII","CDK IX"]
.forEach(c=>{

let aktif=activeCDK.includes(c);

div.innerHTML+=`
<div onclick="toggleCDK('${c}')" style="opacity:${aktif?1:0.3}">
<span style="background:${getColor(c)};
display:inline-block;width:12px;height:12px;"></span> ${c}
</div>`;
});
}

function toggleCDK(c){

if(activeCDK.includes(c)){
activeCDK = activeCDK.filter(x=>x!==c);
}else{
activeCDK.push(c);
}

updateMap();
}

</script>

</body>
</html>
