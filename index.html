<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sebaran Jaga Leuweung</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:8px;
z-index:1000;
font-weight:bold;
}

.popup-scroll{
max-height:250px;
overflow-y:auto;
font-size:13px;
}
</style>
</head>
<body>

<div class="title">Sebaran Petugas Jaga Leuweung</div>
<div id="map"></div>

<script>

// ================= MAP =================
var map = L.map('map').setView([-6.9,107.6],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= HELPER =================
function fixNumber(val){
if(!val) return null;
return parseFloat(String(val).replace(",","."));
}

function isi(v){
return (v==null || v=="") ? "-" : v;
}

// ================= LOAD DATA =================
fetch("Jaga Leuweung.geojson")
.then(res=>res.json())
.then(data=>{

let grouped = {};

// ================= GROUPING PENYULUH =================
data.features.forEach(f=>{

let p = f.properties;

// KOORDINAT DARI ATRIBUT (INI YANG PALING PENTING)
let lat = fixNumber(p["Koordinat Desa (Latitude)"]);
let lon = fixNumber(p["Koordinat Desa (Longitude)"]);

if(!lat || !lon) return;

// KEY = penyuluh
let key = p["Penyuluh Kehutanan Pendamping"] || "Tanpa Penyuluh";

if(!grouped[key]){
grouped[key] = [];
}

grouped[key].push({...p, lat, lon});

});

// ================= TAMPILKAN =================
Object.keys(grouped).forEach(penyuluh=>{

let group = grouped[penyuluh];

// pakai koordinat pertama
let lat = group[0].lat;
let lon = group[0].lon;

// ================= POPUP =================
let html = `
<div class="popup-scroll">
<b>Penyuluh:</b> ${penyuluh}<br>
<b>Jumlah Anggota:</b> ${group.length}
`;

group.forEach(p=>{

html += `
<hr>

<b>Nama:</b> ${isi(p.Nama)}<br>
<b>NIK:</b> ${isi(p.NIK)}<br>
<b>Usia:</b> ${isi(p["Usia (Tahun)"])} tahun<br>

<b>Alamat:</b> ${isi(p.Alamat)}<br>
<b>Desa:</b> ${isi(p.Desa)}<br>
<b>Kecamatan:</b> ${isi(p.Kecamatan)}<br>
<b>Kabupaten:</b> ${isi(p.Kabupaten)}<br>

<br><b>Koordinat Desa:</b><br>
Lat: ${isi(p["Koordinat Desa (Latitude)"])}<br>
Long: ${isi(p["Koordinat Desa (Longitude)"])}<br>

<br><b>Koordinat Persemaian:</b><br>
X: ${isi(p["Koordinat Calon Lokasi Persemaian (X)"])}<br>
Y: ${isi(p["Koordinat Calon Lokasi Persemaian (Y)"])}<br>

<br><b>Koordinat Penanaman:</b><br>
X: ${isi(p["Koordinat Calon Lokasi Penanaman (X)"])}<br>
Y: ${isi(p["Koordinat Calon Lokasi Penanaman (Y)"])}<br>

<br><b>Penyuluh:</b> ${isi(p["Penyuluh Kehutanan Pendamping"])}<br>

<br><b>Keterangan:</b><br>
${isi(p.Keterangan)}<br>

<b>CDK:</b> ${isi(p.CDK)}
`;

});

html += "</div>";

// ================= MARKER =================
L.circleMarker([lat,lon],{
radius:6,
color:"green",
fillOpacity:0.9
})
.addTo(map)
.bindPopup(html);

});

});

</script>
</body>
</html>
