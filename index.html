<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sebaran Petugas Jaga Leuweung Tahun 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:10px;
z-index:1000;
font-weight:bold;
box-shadow:0 0 6px rgba(0,0,0,0.3);
}

.panel-filter{
position:absolute;
top:10px;
left:10px;
background:white;
padding:15px;
border-radius:12px;
width:260px;
z-index:1000;
box-shadow:0 0 6px rgba(0,0,0,0.3);
}

.panel-stat{
position:absolute;
right:10px;
bottom:10px;
background:white;
padding:15px;
border-radius:12px;
width:260px;
z-index:1000;
box-shadow:0 0 6px rgba(0,0,0,0.3);
}

select,button{
width:100%;
margin-top:5px;
padding:6px;
border-radius:6px;
}

.popup-scroll{
max-height:250px;
overflow-y:auto;
font-size:13px;
line-height:1.5;
}
</style>
</head>
<body>

<div class="title">Sebaran Petugas Jaga Leuweung Tahun 2026</div>
<div id="map"></div>

<div class="panel-filter">
<b>Filter Data</b>

<select id="filterKab"><option value="all">Semua Kabupaten</option></select>
<select id="filterCDK"><option value="all">Semua CDK</option></select>
<select id="filterPenyuluh"><option value="all">Semua Penyuluh</option></select>

<button onclick="applyFilter()">Terapkan</button>
<button onclick="resetFilter()">Reset</button>
</div>

<div class="panel-stat">
<b>Total Titik:</b> <span id="total">0</span>
<canvas id="chart"></canvas>
</div>

<script>

// ================= MAP =================
var map = L.map('map').setView([-6.9,107.6],8);

var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var satelit = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
osm.addTo(map);

L.control.layers({"OSM": osm,"Satelit": satelit}).addTo(map);

// ================= GLOBAL =================
let allData = [];
let markersLayer = L.layerGroup().addTo(map);
let chart;

let activeCDK = ["CDK I","CDK II","CDK III","CDK IV","CDK V","CDK VI","CDK VII","CDK VIII","CDK IX"];
let selectedKab=null, selectedCDK=null, selectedPenyuluh=null;
let kabPolygons = [];

// ================= HELPER =================
function fix(v){
if(v===0 || v==="0") return 0;
if(!v) return null;

v = String(v).trim().replace(",", ".").replace(/[^\d\.\-]/g, "");
let n = parseFloat(v);
return isNaN(n) ? null : n;
}

function isi(v){
if(!v) return "data tidak tersedia";
v = String(v).trim();
return v === "" ? "data tidak tersedia" : v;
}

function normalize(t){
return (t||"").toLowerCase().replace(/kabupaten|kota/g,"").trim();
}

// ================= COLOR =================
function getColor(c){
return {
"CDK I":"red","CDK II":"blue","CDK III":"green",
"CDK IV":"orange","CDK V":"purple","CDK VI":"brown",
"CDK VII":"pink","CDK VIII":"gray","CDK IX":"black"
}[c]||"black";
}

// ================= POINT IN POLYGON =================
function pointInPolygon(point, vs) {
let x = point[0], y = point[1];
let inside = false;
for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
let xi = vs[i][0], yi = vs[i][1];
let xj = vs[j][0], yj = vs[j][1];

let intersect = ((yi > y) != (yj > y)) &&
(x < (xj - xi) * (y - yi) / (yj - yi) + xi);

if (intersect) inside = !inside;
}
return inside;
}

// ================= LOAD DATA =================
fetch("./Jaga.geojson")
.then(r=>r.json())
.then(d=>{
allData = d.features ? d.features : d;
initFilter();
updateMap();
});

// ================= LOAD POLYGON =================
fetch("./Jawa Barattt.geojson")
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{
style:{color:"black",weight:fillOpacity:0.1},

onEachFeature:(f,l)=>{

let kab = f.properties.KAB_KOTA;

// simpan polygon
kabPolygons.push({
nama: normalize(kab),
coords: f.geometry.coordinates
});

l.bindPopup("<b>"+kab+"</b>");

l.on("click",()=>{
selectedKab = normalize(kab);
updateMap();
map.fitBounds(l.getBounds());
});
}
}).addTo(map);

});

// ================= FILTER =================
function initFilter(){
let kab=new Set(),cdk=new Set(),penyuluh=new Set();

allData.forEach(f=>{
let p=f.properties || f;
kab.add(p.Kabupaten);
cdk.add(p.CDK);
penyuluh.add(p["Penyuluh Kehutanan Pendamping"] || "Tidak ada penyuluh");
});

isiSelect("filterKab",kab);
isiSelect("filterCDK",cdk);
isiSelect("filterPenyuluh",penyuluh);
}

function isiSelect(id,set){
let el=document.getElementById(id);
set.forEach(v=>{
let o=document.createElement("option");
o.value=v;
o.innerHTML=v;
el.appendChild(o);
});
}

function applyFilter(){
selectedKab = filterKab.value;
selectedCDK = filterCDK.value;
selectedPenyuluh = filterPenyuluh.value;
updateMap();
}

function resetFilter(){
selectedKab=selectedCDK=selectedPenyuluh=null;
document.querySelectorAll("select").forEach(s=>s.value="all");
updateMap();
}

// ================= UPDATE =================
function updateMap(){

markersLayer.clearLayers();

let grouped = {};
let countCDK = {};
let total = 0;

allData.forEach(f=>{

let p=f.properties || f;

let lat = fix(p["Koordinat Desa (Latitude)"]) ?? f.geometry?.coordinates?.[1];
let lon = fix(p["Koordinat Desa (Longitude)"]) ?? f.geometry?.coordinates?.[0];

// swap kalau ketuker
if(lat!==null && lon!==null){
if(Math.abs(lat) > 90 && Math.abs(lon) <= 90){
let temp = lat; lat = lon; lon = temp;
}
}

if(lat===null || lon===null) return;

// FILTER POLYGON (INI YANG FIX)
if(selectedKab && selectedKab!="all"){
let cocok=false;

kabPolygons.forEach(poly=>{
if(poly.nama===normalize(selectedKab)){
poly.coords.forEach(multi=>{
multi.forEach(ring=>{
if(pointInPolygon([lon,lat], ring)){
cocok=true;
}
});
});
}
});

if(!cocok) return;
}

// FILTER LAIN
if(selectedCDK && selectedCDK!="all"){
if(p.CDK!==selectedCDK) return;
}

if(selectedPenyuluh && selectedPenyuluh!="all"){
let pen = p["Penyuluh Kehutanan Pendamping"] || "Tidak ada penyuluh";
if(pen!==selectedPenyuluh) return;
}

if(!activeCDK.includes(p.CDK)) return;

// GROUP
let penyuluh = p["Penyuluh Kehutanan Pendamping"];
let key;

if(!penyuluh){
key = lat.toFixed(6)+"_"+lon.toFixed(6)+"_"+Math.random();
}else{
key = lat.toFixed(6)+"_"+lon.toFixed(6);
}

if(!grouped[key]) grouped[key]=[];
grouped[key].push({...p,lat,lon});

// STAT
countCDK[p.CDK]=(countCDK[p.CDK]||0)+1;
total++;
});

// ================= DRAW =================
Object.values(grouped).forEach(group=>{

let lat=group[0].lat;
let lon=group[0].lon;

let penyuluhList = [...new Set(group.map(p=>p["Penyuluh Kehutanan Pendamping"] || "Tidak ada penyuluh"))];

let html = `<div class="popup-scroll">
<b style="font-size:14px;">Data Petugas Jaga Leuweung</b>
<br><b>Penyuluh:</b> ${penyuluhList.join(", ")}
<br><b>Jumlah Anggota:</b> ${group.length}
`;

group.forEach(p=>{
html+=`
<hr>
<b>Nama:</b> ${isi(p.Nama)}<br>
<b>NIK:</b> ${isi(p.NIK)}<br>
<b>Usia:</b> ${isi(p["Usia (Tahun)"])} tahun<br>
<b>Alamat:</b> ${isi(p.Alamat)}<br>
<b>Desa:</b> ${isi(p.Desa)}<br>
<b>Kecamatan:</b> ${isi(p.Kecamatan)}<br>
<b>Kabupaten:</b> ${isi(p.Kabupaten)}<br>

<br><b>Koordinat Desa:</b><br>
Lat: ${isi(p["Koordinat Desa (Latitude)"])}<br>
Long: ${isi(p["Koordinat Desa (Longitude)"])}<br>

<br><b>Koordinat Calon Lokasi Persemaian:</b><br>
X: ${isi(p["Koordinat Calon Lokasi Persemaian (X)"])}<br>
Y: ${isi(p["Koordinat Calon Lokasi Persemaian (Y)"])}<br>

<br><b>Koordinat Calon Lokasi Penanaman:</b><br>
X: ${isi(p["Koordinat Calon Lokasi Penanaman (X)"])}<br>
Y: ${isi(p["Koordinat Calon Lokasi Penanaman (Y)"])}<br>

<br><b>Penyuluh:</b> ${isi(p["Penyuluh Kehutanan Pendamping"] || "Tidak ada penyuluh")}<br>

<br><b>Keterangan:</b><br>
${isi(p.Keterangan)}<br>

<b>CDK:</b> ${isi(p.CDK)}
`;
});

html += "</div>";

L.circleMarker([lat,lon],{
radius:2,
color:getColor(group[0].CDK),
fillColor:getColor(group[0].CDK),
fillOpacity:1,
weight:1
})
.bindPopup(html)
.addTo(markersLayer);

});

// ================= STAT =================
document.getElementById("total").innerHTML = total;
updateChart(countCDK);
}

// ================= CHART =================
function updateChart(data){
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:'pie',
data:{
labels:Object.keys(data),
datasets:[{
data:Object.values(data),
backgroundColor:Object.keys(data).map(getColor)
}]
}
});
}

</script>

</body>
</html>
