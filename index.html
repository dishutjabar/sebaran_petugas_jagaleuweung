<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sebaran Petugas Jaga Leuweung Tahun 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.judul {
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px;
border-radius:8px;
z-index:1000;
}

.panel {
position:absolute;
bottom:10px;
left:10px;
width:330px;
background:white;
padding:10px;
border-radius:10px;
z-index:1000;
}

.legend {
background:white;
padding:10px;
border-radius:8px;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="judul">
Sebaran Petugas Jaga Leuweung Tahun 2026
</div>

<div class="panel">
<select id="filterPenyuluh"></select>
<div id="summaryBox"></div>
<canvas id="chartCDK"></canvas>
</div>

<script>

// ================= MAP =================
var map = L.map('map').setView([-6.9,107.6],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= GLOBAL =================
var allData, batasLayer, pjlLayer, chart;

let activeCDK = ["CDK I","CDK II","CDK III","CDK IV","CDK V","CDK VI","CDK VII","CDK VIII","CDK IX"];
let selectedKabupaten = null;
let selectedPenyuluh = null;

// ================= HELPER =================
function isi(v){ return (v==null||v=="")?"-":v; }

function getColor(c){
return {
"CDK I":"red","CDK II":"blue","CDK III":"green",
"CDK IV":"orange","CDK V":"purple","CDK VI":"brown",
"CDK VII":"pink","CDK VIII":"gray","CDK IX":"black"
}[c]||"black";
}

// AMBIL KOORDINAT AMAN
function getLatLon(f){

// PRIORITAS geometry
if(f.geometry && f.geometry.coordinates){
let lon = f.geometry.coordinates[0];
let lat = f.geometry.coordinates[1];

if(!isNaN(lat) && !isNaN(lon)){
return [lat,lon];
}
}

// fallback ke atribut
let p = f.properties;

let lat = parseFloat(p["Koordinat Desa (Latitude)"]);
let lon = parseFloat(p["Koordinat Desa (Longitude)"]);

if(!isNaN(lat) && !isNaN(lon)){
return [lat,lon];
}

return null;
}

// ================= LOAD =================
fetch("Jaga Leuweung.geojson")
.then(r=>r.json())
.then(d=>{
allData = d;
initFilter();
updateMap();
});

fetch("Jawa Barattt.geojson")
.then(r=>r.json())
.then(d=>{

batasLayer = L.geoJSON(d,{
style:{color:"black",weight:1,fillOpacity:0.1},

onEachFeature:(f,l)=>{

let kab = f.properties.KAB_KOTA;

l.bindPopup("<b>"+kab+"</b>");

l.on("click",()=>{
selectedKabupaten = kab.toLowerCase();
updateMap();
map.fitBounds(l.getBounds());
});

}
}).addTo(map);

});

// ================= FILTER =================
function initFilter(){

let set = new Set();

allData.features.forEach(f=>{
set.add(f.properties["Penyuluh Kehutanan Pendamping"]);
});

let select = document.getElementById("filterPenyuluh");

select.innerHTML = "<option value=''>Semua Penyuluh</option>";

set.forEach(p=>{
let opt = document.createElement("option");
opt.value = p;
opt.text = p;
select.appendChild(opt);
});

select.onchange = ()=>{
selectedPenyuluh = select.value || null;
updateMap();
};
}

// ================= UPDATE =================
function updateMap(){

if(pjlLayer) map.removeLayer(pjlLayer);

let grouped = {};
let countCDK = {};
let total = 0;

allData.features.forEach(f=>{

let p = f.properties;

// FILTER KABUPATEN (AMAN CASE)
if(selectedKabupaten){
if(!p.Kabupaten || p.Kabupaten.toLowerCase() !== selectedKabupaten) return;
}

// FILTER PENYULUH
if(selectedPenyuluh && p["Penyuluh Kehutanan Pendamping"] !== selectedPenyuluh) return;

// FILTER CDK
if(!activeCDK.includes(p.CDK)) return;

// KOORDINAT
let latlon = getLatLon(f);
if(!latlon) return;

// GROUP
let key = p["Penyuluh Kehutanan Pendamping"] || "Tanpa Penyuluh";

if(!grouped[key]) grouped[key] = [];

grouped[key].push({...f, latlon});

countCDK[p.CDK] = (countCDK[p.CDK]||0)+1;
total++;

});

// ================= DRAW =================
pjlLayer = L.layerGroup();

Object.keys(grouped).forEach(penyuluh=>{

let group = grouped[penyuluh];
let latlon = group[0].latlon;

let html = `<b>Penyuluh:</b> ${penyuluh}<br><b>Jumlah:</b> ${group.length}`;

group.forEach(g=>{
let p = g.properties;

html += `
<hr>
<b>Nama:</b> ${isi(p.Nama)}<br>
<b>NIK:</b> ${isi(p.NIK)}<br>
<b>Usia:</b> ${isi(p["Usia (Tahun)"])}<br>
<b>Desa:</b> ${isi(p.Desa)}<br>
<b>Kecamatan:</b> ${isi(p.Kecamatan)}<br>
<b>Kabupaten:</b> ${isi(p.Kabupaten)}<br>
`;
});

let marker = L.circleMarker(latlon,{
radius:3,
color:getColor(group[0].properties.CDK),
fillOpacity:1
});

marker.bindPopup(html);

pjlLayer.addLayer(marker);

});

pjlLayer.addTo(map);

updateChart(countCDK);
updateSummary(countCDK,total);
}

// ================= SUMMARY =================
function updateSummary(data,total){

let html = "<b>Total: "+total+"</b><br>";

Object.entries(data).forEach(d=>{
html += d[0]+": "+d[1]+"<br>";
});

document.getElementById("summaryBox").innerHTML = html;
}

// ================= CHART =================
function updateChart(data){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chartCDK"),{
type:"pie",
data:{
labels:Object.keys(data),
datasets:[{
data:Object.values(data),
backgroundColor:Object.keys(data).map(c=>getColor(c))
}]
}
});
}

// ================= LEGENDA =================
var legend = L.control({position:"topright"});

legend.onAdd = function(){
var div = L.DomUtil.create("div","legend");

["CDK I","CDK II","CDK III","CDK IV","CDK V","CDK VI","CDK VII","CDK VIII","CDK IX"]
.forEach(c=>{
div.innerHTML += `
<div onclick="toggleCDK('${c}')" style="cursor:pointer">
<span style="background:${getColor(c)};
display:inline-block;width:12px;height:12px;"></span> ${c}
</div>`;
});

return div;
};

legend.addTo(map);

function toggleCDK(c){
if(activeCDK.includes(c)){
activeCDK = activeCDK.filter(x=>x!==c);
}else{
activeCDK.push(c);
}
updateMap();
}

</script>
</body>
</html>
